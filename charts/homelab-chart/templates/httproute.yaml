{{- if .Values.httproute.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "homelab-chart.fullname" . }}
  labels:
    {{- include "homelab-chart.labels" . | nindent 4 }}
  {{- with .Values.httproute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.httproute.parentRefs }}
  parentRefs:
    {{- range .Values.httproute.parentRefs }}
    - group: {{ .group | default "gateway.networking.k8s.io" }}
      kind: {{ .kind | default "Gateway" }}
      name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .Values.httproute.hostnames }}
  hostnames:
    {{- range .Values.httproute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.httproute.rules -}}
      {{- range .Values.httproute.rules }}
    - {{- with .name }}
      name: {{ . }}
      {{- end }}
      matches:
        {{- if .matches }}
        {{- toYaml .matches | nindent 8 }}
        {{- else }}
        - path:
            type: PathPrefix
            value: /
        {{- end }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name }}
          port: {{ .port }}
          weight: {{ .weight | default 1 }}
        {{- end }}
      {{- end }}
    {{- else }}
    - backendRefs:
      - group: ""
        kind: Service
        name: {{ include "homelab-chart.fullname" . }}
        port: {{ .Values.service.port }}
    {{- end }}
{{- end }}
---
{{- range .Values.httproutes }}
{{- if not .name }}
{{- fail "httproutes entry is missing required field: name" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  labels:
    {{- include "homelab-chart.labels" $ | nindent 4 }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .parentRefs }}
  parentRefs:
    {{- range .parentRefs }}
    - group: {{ .group | default "gateway.networking.k8s.io" }}
      kind: {{ .kind | default "Gateway" }}
      name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .hostnames }}
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .rules -}}
      {{- range .rules }}
    - {{- with .name }}
      name: {{ . }}
      {{- end }}
      matches:
        {{- if .matches }}
        {{- toYaml .matches | nindent 8 }}
        {{- else }}
        - path:
            type: PathPrefix
            value: /
        {{- end }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name }}
          port: {{ .port }}
          weight: {{ .weight | default 1 }}
        {{- end }}
      {{- end }}
    {{- else }}
    - backendRefs:
      - group: ""
        kind: Service
        name: {{ include "homelab-chart.fullname" $ }}
        port: {{ $.Values.service.port }}
    {{- end }}
---
{{- end }}